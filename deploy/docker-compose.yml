services:
  db:
    image: postgres:16
    container_name: fineract-postgres
    restart: unless-stopped
    mem_limit: 2g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "max_connections=100"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fineract_tenants
      FINERACT_DB_PASSWORD: ${FINERACT_DB_PASSWORD}
      DEFAULT_TENANT_DB_NAME: ${DEFAULT_TENANT_DB_NAME:-fineract_fincraft}
      TZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fineract-net

  fineract:
    image: ${FINERACT_IMAGE}
    container_name: fineract-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 6g
    environment:
      TZ: UTC
      JAVA_TOOL_OPTIONS: "-Xms1g -Xmx4g"
      FINERACT_HIKARI_DRIVER_SOURCE_CLASS_NAME: org.postgresql.Driver
      FINERACT_HIKARI_JDBC_URL: jdbc:postgresql://db:5432/fineract_tenants
      FINERACT_HIKARI_USERNAME: fineract_app
      FINERACT_HIKARI_PASSWORD: ${FINERACT_DB_PASSWORD}
      FINERACT_HIKARI_MINIMUM_IDLE: 3
      FINERACT_HIKARI_MAXIMUM_POOL_SIZE: 10
      FINERACT_HIKARI_IDLE_TIMEOUT: 60000
      FINERACT_HIKARI_CONNECTION_TIMEOUT: 20000
      FINERACT_HIKARI_TEST_QUERY: "SELECT 1"
      FINERACT_HIKARI_AUTO_COMMIT: "true"
      FINERACT_SERVER_SSL_ENABLED: "true"
      FINERACT_DEFAULT_TENANTDB_HOSTNAME: db
      FINERACT_DEFAULT_TENANTDB_PORT: 5432
      FINERACT_DEFAULT_TENANTDB_UID: fineract_app
      FINERACT_DEFAULT_TENANTDB_PWD: ${FINERACT_DB_PASSWORD}
      FINERACT_DEFAULT_TENANTDB_NAME: ${DEFAULT_TENANT_DB_NAME:-fineract_fincraft}
      FINERACT_DEFAULT_TENANTDB_IDENTIFIER: ${DEFAULT_TENANT_IDENTIFIER:-fincraft}
      FINERACT_DEFAULT_TENANTDB_CONN_PARAMS: ""
    ports:
      - "127.0.0.1:8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "grep -qi ':20FB' /proc/net/tcp /proc/net/tcp6"]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fineract-net

  fincraft:
    image: nginx:alpine
    container_name: fincraft-ui
    restart: unless-stopped
    volumes:
      # Explicit allowlist from the repo root (frontend now lives at the
      # repo root, one level above ./deploy/) — NOT a blanket parent-dir
      # mount, which would also expose deploy/.env (DB passwords) and
      # deploy/nginx-certs/ (the TLS private key) to nginx/the internet.
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../404.html:/usr/share/nginx/html/404.html:ro
      - ../favicon.svg:/usr/share/nginx/html/favicon.svg:ro
      - ../manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ../robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ../service-worker.js:/usr/share/nginx/html/service-worker.js:ro
      - ../css:/usr/share/nginx/html/css:ro
      - ../js:/usr/share/nginx/html/js:ro
      - ../views:/usr/share/nginx/html/views:ro
      - ./nginx-fincraft.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-certs:/etc/nginx/certs:ro
      - ./certbot-webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      fineract:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fineract-net

  # Keycloak — the OAuth2/OIDC identity provider FinCraft will eventually
  # authenticate against instead of Fineract's own Basic Auth. Bound to
  # 127.0.0.1 only for now, deliberately not exposed publicly or wired into
  # nginx yet — see deploy/KEYCLOAK-SETUP.md for how to reach the admin
  # console safely (SSH tunnel) and what to configure once you're in.
  # Fineract's own login is completely unaffected until we explicitly flip
  # its OAuth env vars in a later step, once this is verified working.
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: fincraft-keycloak
    restart: unless-stopped
    command: start --hostname-strict=false --proxy-headers=xforwarded
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: UTC
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000;
          echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost:9000\r\nConnection: close\r\n\r\n" >&3;
          if cat <&3 | grep -q '"status": "UP"'; then exit 0; else exit 1; fi
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fineract-net

volumes:
  postgres-data:

networks:
  fineract-net:
    driver: bridge
