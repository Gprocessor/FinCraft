<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https: http://localhost:* ws://localhost:*; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"/>
  <title>FinCraft — Apache Fineract Platform</title>
  <meta name="description" content="FinCraft: a modern web UI for Apache Fineract microfinance platform"/>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- Font Awesome 6 (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="./css/app.css"/>
  <!-- SPA redirect for GitHub Pages (generated by _redirects handling) -->
  <script src="./js/spa-redirect.js"></script>
</head>
<body>
  <!-- Login screen (shown before auth) -->
  <div id="loginScreen"></div>

  <!-- App shell (hidden until authenticated) -->
  <div id="appShell" hidden></div>

  <!-- Modal container -->
  <div id="modalRoot"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
